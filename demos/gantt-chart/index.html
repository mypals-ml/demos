    }

    function saveState() {
      localStorage.setItem('gantt_groups', JSON.stringify(state.groups));
      localStorage.setItem('gantt_tasks', JSON.stringify(state.tasks));
      calculateProjectBoundaries();
      render();
    }

    function calculateProjectBoundaries() {
      if (state.tasks.length === 0) {
        state.projectStart = new Date();
        state.projectEnd = addDays(state.projectStart, 30);
        state.totalTimelineDays = 30;
        return;
      }

      let min = parseDateStr(state.tasks[0].startDate);
      let max = parseDateStr(state.tasks[0].endDate);

      state.tasks.forEach(t => {
        const start = parseDateStr(t.startDate);
        const end = parseDateStr(t.endDate);
        if (start < min) min = start;
        if (end > max) max = end;
      });

      // Add timeline padding (5 days start padding, 15 days end padding for growth space)
      state.projectStart = addDays(min, -6);
      state.projectEnd = addDays(max, 16);
      state.totalTimelineDays = diffDays(state.projectStart, state.projectEnd);
      
      // Update css grid layout bounds
      let pxPerDay = 40;
      if (state.zoomScale === 'weeks') pxPerDay = 15;
      else if (state.zoomScale === 'months') pxPerDay = 4.5;
      
      document.documentElement.style.setProperty('--day-width', `${pxPerDay}px`);
      document.documentElement.style.setProperty('--total-days', state.totalTimelineDays);
    }

    // CRITICAL PATH METHOD (CPM) ALGORITHM
    function computeCriticalPath() {
      if (state.tasks.length === 0) return [];
      
      // Reset statuses
      const tasksMap = {};
      const adj = {};
      const indegree = {};
      
      state.tasks.forEach(t => {
        tasksMap[t.id] = {
          ...t,
          duration: Math.max(1, diffDays(parseDateStr(t.startDate), parseDateStr(t.endDate))),
          es: 0,
          ef: 0,
          ls: 0,
          lf: 0,
          slack: 0
        };
        adj[t.id] = [];
        indegree[t.id] = 0;
      });

      // Build dependency graph (note: dependency list contains prerequisites)
      // So prerequisite -> task
      state.tasks.forEach(t => {
        t.dependencies.forEach(prereqId => {
          if (tasksMap[prereqId]) {
            adj[prereqId].push(t.id);
            indegree[t.id]++;
          }
        });
      });

      // Topological Sort using Kahn's Algorithm
      const queue = [];
      const order = [];
      
      Object.keys(tasksMap).forEach(id => {
        if (indegree[id] === 0) {
          queue.push(id);
        }
      });

      while (queue.length > 0) {
        const u = queue.shift();
        order.push(u);
        adj[u].forEach(v => {
          indegree[v]--;
          if (indegree[v] === 0) {
            queue.push(v);
          }
        });
      }

      // If cycle is detected (order doesn't contain all nodes), skip CPM calculation
      if (order.length !== state.tasks.length) {
        return [];
      }

      // Forward Pass: Calculate Earliest Start (es) & Earliest Finish (ef)
      order.forEach(u => {
        const t = tasksMap[u];
        // ES is the max EF of all prerequisites
        let maxPrereqEf = 0;
        state.tasks.find(x => x.id === u).dependencies.forEach(prereqId => {
          if (tasksMap[prereqId] && tasksMap[prereqId].ef > maxPrereqEf) {
            maxPrereqEf = tasksMap[prereqId].ef;
          }
        });
        t.es = maxPrereqEf;
        t.ef = t.es + t.duration;
      });

      // Find the project completion time
      let maxProjectEf = 0;
      order.forEach(u => {
        if (tasksMap[u].ef > maxProjectEf) {
          maxProjectEf = tasksMap[u].ef;
        }
      });

      // Backward Pass: Calculate Latest Finish (lf) and Latest Start (ls)
      // Initialize with max completion time
      order.forEach(u => {
        tasksMap[u].lf = maxProjectEf;
        tasksMap[u].ls = maxProjectEf - tasksMap[u].duration;
      });

      // Backwards propagation
      for (let i = order.length - 1; i >= 0; i--) {
        const u = order[i];
        const t = tasksMap[u];
        
        // If there are dependents, LF is the min LS of dependents
        if (adj[u].length > 0) {
          let minDependentLs = Infinity;
          adj[u].forEach(v => {
            if (tasksMap[v].ls < minDependentLs) {
              minDependentLs = tasksMap[v].ls;
            }
          });
          t.lf = minDependentLs;
          t.ls = t.lf - t.duration;
        }
      }

      // Slack & Critical Path filtering
      const criticalPathIds = [];
      order.forEach(u => {
        const t = tasksMap[u];
        t.slack = t.ls - t.es;
        // Slack of 0 means task is on critical path
        if (t.slack <= 0) {
          criticalPathIds.push(u);
        }
      });

      return criticalPathIds;
    }

    // MAIN RENDER FUNCTION
    function render() {
      renderTimelineHeaders();
      renderBodyRows();
      setTimeout(drawDependencyLines, 0); // Wait for browser DOM layout finish
    }

    // RENDER TIMELINE HEADER CELLS
    function renderTimelineHeaders() {
      const container = document.getElementById('timeline-headers');
      container.innerHTML = '';

      const majorRow = document.createElement('div');
      majorRow.className = 'gantt-timeline-major';
      
      const minorRow = document.createElement('div');
      minorRow.className = 'gantt-timeline-minor';
      
      container.appendChild(majorRow);
      container.appendChild(minorRow);

      let pxPerDay = getPixelsPerDay();

      if (state.zoomScale === 'days') {
        // Group columns by Month-Year
        let currentMonthStr = "";
        let currentWidthSum = 0;
        let pendingCell = null;

        for (let i = 0; i < state.totalTimelineDays; i++) {
          const date = addDays(state.projectStart, i);
          const mStr = getFormattedMonthYear(date);
          
          if (mStr !== currentMonthStr) {
            if (pendingCell) {
              pendingCell.style.width = `${currentWidthSum}px`;
              majorRow.appendChild(pendingCell);
            }
            currentMonthStr = mStr;
            currentWidthSum = 0;
            pendingCell = document.createElement('div');
            pendingCell.style.flexShrink = '0';
            pendingCell.style.borderRight = '1px solid var(--border-color)';
            pendingCell.style.height = '100%';
            pendingCell.style.display = 'flex';
            pendingCell.style.alignItems = 'center';
            pendingCell.style.paddingLeft = '12px';
            pendingCell.textContent = mStr;
          }
          currentWidthSum += pxPerDay;

          // Minor cell (Days)
          const minorCell = document.createElement('div');
          minorCell.className = 'gantt-time-cell';
          minorCell.style.width = `${pxPerDay}px`;
          
          // Weekend highlights
          const dayOfWeek = date.getDay();
          if (dayOfWeek === 0 || dayOfWeek === 6) {
            minorCell.style.backgroundColor = 'var(--bg-color)';
            minorCell.style.fontWeight = 'bold';
            minorCell.style.color = 'var(--status-delayed)';
          }
          minorCell.textContent = date.getDate();
          minorRow.appendChild(minorCell);
        }
        
        if (pendingCell) {
          pendingCell.style.width = `${currentWidthSum}px`;
          majorRow.appendChild(pendingCell);
        }

      } else if (state.zoomScale === 'weeks') {
        // Render headers by week
        let currentMonthStr = "";
        let currentWidthSum = 0;
        let pendingCell = null;

        // Loop by weekly steps
        for (let i = 0; i < state.totalTimelineDays; i += 7) {
          const date = addDays(state.projectStart, i);
          const mStr = getFormattedMonthYear(date);

          if (mStr !== currentMonthStr) {
            if (pendingCell) {
              pendingCell.style.width = `${currentWidthSum}px`;
              majorRow.appendChild(pendingCell);
            }
            currentMonthStr = mStr;
            currentWidthSum = 0;
            pendingCell = document.createElement('div');
            pendingCell.style.flexShrink = '0';
            pendingCell.style.borderRight = '1px solid var(--border-color)';
            pendingCell.style.height = '100%';
            pendingCell.style.display = 'flex';
            pendingCell.style.alignItems = 'center';
            pendingCell.style.paddingLeft = '12px';
            pendingCell.textContent = mStr;
          }
          // The width of a week
          const remainingDays = Math.min(7, state.totalTimelineDays - i);
          const weekWidth = remainingDays * pxPerDay;
          currentWidthSum += weekWidth;

          // Minor cell (Week number or starting day)
          const minorCell = document.createElement('div');
          minorCell.className = 'gantt-time-cell';
          minorCell.style.width = `${weekWidth}px`;
          
          const weekNo = getWeekNumber(date);
          minorCell.textContent = `W${weekNo} (${date.getDate()})`;
          minorRow.appendChild(minorCell);
        }

        if (pendingCell) {
          pendingCell.style.width = `${currentWidthSum}px`;
          majorRow.appendChild(pendingCell);
        }

      } else if (state.zoomScale === 'months') {
        // Render headers by month/quarter
        let currentYearStr = "";
        let currentWidthSum = 0;
        let pendingCell = null;

        for (let i = 0; i < state.totalTimelineDays; ) {
          const date = addDays(state.projectStart, i);
          const yearStr = date.getFullYear().toString();
          
          // Number of days left in this month
          const currentMonth = date.getMonth();
          const nextMonthDate = new Date(date.getFullYear(), currentMonth + 1, 1);
          const daysInMonth = Math.round((nextMonthDate - date) / (1000 * 60 * 60 * 24));
          const actualDays = Math.min(daysInMonth, state.totalTimelineDays - i);
          const monthWidth = actualDays * pxPerDay;

          if (yearStr !== currentYearStr) {
            if (pendingCell) {
              pendingCell.style.width = `${currentWidthSum}px`;
              majorRow.appendChild(pendingCell);
            }
            currentYearStr = yearStr;
            currentWidthSum = 0;
            pendingCell = document.createElement('div');
            pendingCell.style.flexShrink = '0';
            pendingCell.style.borderRight = '1px solid var(--border-color)';
            pendingCell.style.height = '100%';
            pendingCell.style.display = 'flex';
            pendingCell.style.alignItems = 'center';
            pendingCell.style.paddingLeft = '12px';
            pendingCell.textContent = yearStr;
          }
          currentWidthSum += monthWidth;

          // Minor cell (Month name)
          const minorCell = document.createElement('div');
          minorCell.className = 'gantt-time-cell';
          minorCell.style.width = `${monthWidth}px`;
          minorCell.textContent = date.toLocaleDateString('en-US', { month: 'short' });
          minorRow.appendChild(minorCell);

          i += actualDays;
        }

        if (pendingCell) {
          pendingCell.style.width = `${currentWidthSum}px`;
          majorRow.appendChild(pendingCell);
        }
      }
    }

    // HELPER: Get week number of year
    function getWeekNumber(d) {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    // RENDER BODY ROWS (GROUPS & TASKS)
    function renderBodyRows() {
      const container = document.getElementById('gantt-rows-container');
      container.innerHTML = '';

      const pxPerDay = getPixelsPerDay();
      const totalWidth = state.totalTimelineDays * pxPerDay;

      // Filter tasks
      const filteredTasks = state.tasks.filter(t => {
        const matchesSearch = t.name.toLowerCase().includes(state.searchQuery.toLowerCase());
        const matchesStatus = state.statusFilter === 'all' || t.status === state.statusFilter;
        const matchesAssignee = state.assigneeFilter === 'all' || t.assignee === state.assigneeFilter;
        return matchesSearch && matchesStatus && matchesAssignee;
      });

      const filteredTaskIds = new Set(filteredTasks.map(t => t.id));
      const criticalPathIds = new Set(state.showCriticalPath ? computeCriticalPath() : []);

      // Calculate rollups for each group
      const groupRollups = {};
      state.groups.forEach(g => {
        const groupTasks = state.tasks.filter(t => t.groupId === g.id && filteredTaskIds.has(t.id));
        if (groupTasks.length === 0) {
          groupRollups[g.id] = null;
          return;
        }
        
        let minStart = parseDateStr(groupTasks[0].startDate);
        let maxEnd = parseDateStr(groupTasks[0].endDate);
        let progressSum = 0;
        let durationSum = 0;

        groupTasks.forEach(t => {
          const s = parseDateStr(t.startDate);
          const e = parseDateStr(t.endDate);
          const dur = Math.max(1, diffDays(s, e));
          
          if (s < minStart) minStart = s;
          if (e > maxEnd) maxEnd = e;
          
          progressSum += t.progress * dur;
          durationSum += dur;
        });

        groupRollups[g.id] = {
          startDate: formatDateStr(minStart),
          endDate: formatDateStr(maxEnd),
          progress: durationSum > 0 ? Math.round(progressSum / durationSum) : 0
        };
      });

      // Loop through groups and their tasks
      state.groups.forEach(g => {
        const rollup = groupRollups[g.id];
        
        // Render Group Row if it has matching tasks or search is blank
        const groupTasks = state.tasks.filter(t => t.groupId === g.id);
        const matchingChildTasks = groupTasks.filter(t => filteredTaskIds.has(t.id));
        
        if (matchingChildTasks.length === 0 && state.searchQuery !== '') {
          return; // Hide empty group on active filter
        }

        const groupRow = document.createElement('div');
        groupRow.className = `gantt-row gantt-row-group ${g.collapsed ? 'collapsed' : ''}`;
        groupRow.dataset.groupId = g.id;

        // Group Sidebar Cell
        const groupSidebar = document.createElement('div');
        groupSidebar.className = 'gantt-row-sidebar';
        groupSidebar.innerHTML = `
          <div class="group-collapse-btn" onclick="toggleGroupCollapse('${g.id}', event)">
            <span class="icon">keyboard_arrow_down</span>
          </div>
          <span class="icon" style="color: var(--primary); font-size: 18px; margin-right: 6px; display: inline-flex; align-items: center;">
            ${g.collapsed ? 'folder' : 'folder_open'}
          </span>
          <span style="flex: 1; cursor: pointer; font-weight: 600; font-family: var(--font-display);" onclick="openGroupEditor('${g.id}')">${g.name}</span>
          ${rollup ? `<span class="status-chip group-progress-chip" title="${rollup.progress}% complete">${rollup.progress}%</span>` : ''}
        `;
        groupRow.appendChild(groupSidebar);

        // Group Timeline Cell
        const groupTimeline = document.createElement('div');
        groupTimeline.className = 'gantt-row-timeline';
        groupTimeline.style.width = `${totalWidth}px`;
        
        // Timeline Gridlines background
        const gridBg = document.createElement('div');
        gridBg.className = 'gantt-grid-bg';
        groupTimeline.appendChild(gridBg);

        // Group Rollup Bar
        if (rollup) {
          const startOffset = diffDays(state.projectStart, parseDateStr(rollup.startDate));
          const duration = diffDays(parseDateStr(rollup.startDate), parseDateStr(rollup.endDate));
          
          const rollupBar = document.createElement('div');
          rollupBar.className = 'gantt-rollup-bar';
          rollupBar.style.left = `${startOffset * pxPerDay}px`;
          rollupBar.style.width = `${duration * pxPerDay}px`;
          
          const rollupProgress = document.createElement('div');
          rollupProgress.className = 'gantt-rollup-progress';
          rollupProgress.style.width = `${rollup.progress}%`;
          rollupBar.appendChild(rollupProgress);

          // Render miniature pills for each subtask inside the rollup bar
          const subtasksContainer = document.createElement('div');
          subtasksContainer.className = 'gantt-rollup-subtasks-container';
          
          const groupStart = parseDateStr(rollup.startDate);
          const groupDuration = Math.max(1, duration);

          matchingChildTasks.forEach(child => {
            const childStart = parseDateStr(child.startDate);
            const childEnd = parseDateStr(child.endDate);
            const childDuration = diffDays(childStart, childEnd);
            
            const leftPct = (diffDays(groupStart, childStart) / groupDuration) * 100;
            const widthPct = (childDuration / groupDuration) * 100;

            let statusColor = "var(--status-not-started)";
            if (child.status === "In Progress") statusColor = "var(--status-in-progress)";
            else if (child.status === "Completed") statusColor = "var(--status-completed)";
            else if (child.status === "Delayed") statusColor = "var(--status-delayed)";

            const pill = document.createElement('div');
            pill.className = 'gantt-rollup-subtask-pill';
            pill.style.left = `${leftPct}%`;
            pill.style.width = `${widthPct}%`;
            pill.style.backgroundColor = statusColor;
            
            subtasksContainer.appendChild(pill);
          });

          rollupBar.appendChild(subtasksContainer);
          groupTimeline.appendChild(rollupBar);
        }

        groupRow.appendChild(groupTimeline);
        container.appendChild(groupRow);

        // Render Task Rows in this Group
        groupTasks.forEach(t => {
          const isVisible = filteredTaskIds.has(t.id);
          const isCollapsedChild = g.collapsed;

          const taskRow = document.createElement('div');
          taskRow.className = `gantt-row ${!isVisible ? 'is-collapsed-child' : ''} ${isCollapsedChild ? 'is-collapsed-child' : ''}`;
          taskRow.dataset.taskId = t.id;

          // Sidebar Task Cell
          const sidebarCell = document.createElement('div');
          sidebarCell.className = 'gantt-row-sidebar';
          
          const assigneeObj = ASSIGNEES.find(a => a.id === t.assignee);
          
          sidebarCell.innerHTML = `
            <div class="task-sidebar-cell">
              <span class="icon" style="color: var(--text-muted); font-size: 16px;">subdirectory_arrow_right</span>
              <span class="task-title-text" style="cursor: pointer;" onclick="openTaskEditor('${t.id}')" title="${t.name}">${t.name}</span>
              
              <div class="task-meta-info">
                <span class="status-chip status-${t.status.toLowerCase().replace(' ', '-')}">${t.status}</span>
                <div class="avatar" style="background-color: ${assigneeObj ? assigneeObj.color : '#64748b'}" title="${assigneeObj ? assigneeObj.name : 'Unassigned'}">
                  ${assigneeObj ? assigneeObj.initials : '?' }
                </div>
              </div>
            </div>
          `;
          taskRow.appendChild(sidebarCell);

          // Timeline Task Cell
          const timelineCell = document.createElement('div');
          timelineCell.className = 'gantt-row-timeline';
          timelineCell.style.width = `${totalWidth}px`;
          
          const cellGridBg = document.createElement('div');
          cellGridBg.className = 'gantt-grid-bg';
          timelineCell.appendChild(cellGridBg);

          // Render Gantt Task Bar
          const startOffset = diffDays(state.projectStart, parseDateStr(t.startDate));
          const duration = diffDays(parseDateStr(t.startDate), parseDateStr(t.endDate));

          const barWrapper = document.createElement('div');
          barWrapper.className = `gantt-bar-wrapper ${criticalPathIds.has(t.id) ? 'critical-path-task' : ''}`;
          barWrapper.dataset.taskId = t.id;
          barWrapper.dataset.taskStatus = t.status;
          barWrapper.style.left = `${startOffset * pxPerDay}px`;
          barWrapper.style.width = `${duration * pxPerDay}px`;

          // Define Color based on Status
          let statusColor = "var(--status-not-started)";
          if (t.status === "In Progress") statusColor = "var(--status-in-progress)";
          else if (t.status === "Completed") statusColor = "var(--status-completed)";
          else if (t.status === "Delayed") statusColor = "var(--status-delayed)";

          const bar = document.createElement('div');
          bar.className = 'gantt-bar';
          bar.style.setProperty('--bar-gradient', `linear-gradient(90deg, ${statusColor}, ${statusColor}dd)`);
          
          const barProgress = document.createElement('div');
          barProgress.className = 'gantt-bar-progress';
          barProgress.style.width = `${t.progress}%`;
          
          const label = document.createElement('div');
          label.className = 'gantt-bar-label';
          label.textContent = `${t.progress}%`;

          // Drag Handles
          const resizeLeft = document.createElement('div');
          resizeLeft.className = 'gantt-resize-handle gantt-resize-handle-left';
          
          const resizeRight = document.createElement('div');
          resizeRight.className = 'gantt-resize-handle gantt-resize-handle-right';

          bar.appendChild(barProgress);
          bar.appendChild(label);
          barWrapper.appendChild(resizeLeft);
          barWrapper.appendChild(bar);
          barWrapper.appendChild(resizeRight);

          // Tooltip and Drag event triggers
          setupBarInteractionEvents(barWrapper, t);

          timelineCell.appendChild(barWrapper);
          taskRow.appendChild(timelineCell);
          container.appendChild(taskRow);
        });
      });
    }

    // INTERACTIVE DRAW CONNECTOR LINES (SVG)
    function drawDependencyLines() {
      const svg = document.getElementById('gantt-svg');
      svg.innerHTML = ''; // Clear previous

      const scrollport = document.getElementById('gantt-scrollport');
      if (!scrollport) return;

      const pxPerDay = getPixelsPerDay();
      const scrollportRect = scrollport.getBoundingClientRect();
      
      const gridCanvas = document.getElementById('gantt-grid-canvas');
      const canvasRect = gridCanvas.getBoundingClientRect();

      // Configure SVG size
      const svgContainer = svg.parentElement;
      svg.style.width = `${state.totalTimelineDays * pxPerDay}px`;
      svg.style.height = `${gridCanvas.scrollHeight - 64}px`; // Exclude header row

      const criticalPathIds = new Set(state.showCriticalPath ? computeCriticalPath() : []);

      // Draw each dependency
      state.tasks.forEach(task => {
        // If task is not visible in DOM, skip drawing
        const taskRow = document.querySelector(`.gantt-row[data-task-id="${task.id}"]`);
        if (!taskRow || taskRow.classList.contains('is-collapsed-child')) return;

        const targetBar = taskRow.querySelector('.gantt-bar-wrapper');
        if (!targetBar) return;

        task.dependencies.forEach(prereqId => {
          const prereqTask = state.tasks.find(t => t.id === prereqId);
          if (!prereqTask) return;

          const prereqRow = document.querySelector(`.gantt-row[data-task-id="${prereqId}"]`);
          if (!prereqRow || prereqRow.classList.contains('is-collapsed-child')) return;

          const sourceBar = prereqRow.querySelector('.gantt-bar-wrapper');
          if (!sourceBar) return;

          // Get coordinates relative to the svg viewport (which starts at X = sidebar-width, Y = header-height)
          const sourceRect = sourceBar.getBoundingClientRect();
          const targetRect = targetBar.getBoundingClientRect();

          // X coordinates are relative to the timeline content
          const x1 = sourceRect.right - canvasRect.left - 320; // 320 is sidebar width
          const y1 = (sourceRect.top + sourceRect.bottom) / 2 - canvasRect.top - 64; // 64 is header height
          
          const x2 = targetRect.left - canvasRect.left - 320;
          const y2 = (targetRect.top + targetRect.bottom) / 2 - canvasRect.top - 64;

          const isCritical = criticalPathIds.has(task.id) && criticalPathIds.has(prereqId);
          const isConflict = parseDateStr(task.startDate) < parseDateStr(prereqTask.endDate);

          drawBezierCurve(svg, x1, y1, x2, y2, task.id, prereqId, isCritical, isConflict);
        });
      });
    }

    function drawBezierCurve(svg, x1, y1, x2, y2, targetId, sourceId, isCritical, isConflict) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      
      let d = "";
      
      if (x2 >= x1 + 15) {
        // Normal curve: goes right and wraps nicely
        const controlOffset = Math.max(30, (x2 - x1) / 2);
        d = `M ${x1} ${y1} C ${x1 + controlOffset} ${y1}, ${x2 - controlOffset} ${y2}, ${x2} ${y2}`;
      } else {
        // Backwards curve (Scheduling conflict or task overlaps prereq)
        const vOffset = 22; // Half row height
        const sideOffset = 24;
        d = `M ${x1} ${y1} 
             C ${x1 + sideOffset} ${y1}, ${x1 + sideOffset} ${y1 + vOffset}, ${x1} ${y1 + vOffset} 
             L ${x2 - sideOffset} ${y1 + vOffset} 
             C ${x2 - 2 * sideOffset} ${y1 + vOffset}, ${x2 - sideOffset} ${y2}, ${x2} ${y2}`;
      }

      path.setAttribute('d', d);
      path.setAttribute('class', `dependency-line 
        ${isCritical ? 'critical-path-line' : ''} 
        ${isConflict ? 'conflict-line' : ''}
      `);
      path.dataset.sourceId = sourceId;
      path.dataset.targetId = targetId;

      // Draw Arrow Head at target
      marker.setAttribute('points', `${x2},${y2} ${x2-6},${y2-4} ${x2-6},${y2+4}`);
      marker.setAttribute('class', `dependency-arrow 
        ${isCritical ? 'critical-path-arrow' : ''} 
        ${isConflict ? 'conflict-arrow' : ''}
      `);

      svg.appendChild(path);
      svg.appendChild(marker);
    }

    // MOUSE EVENT INTERACTION SETUP FOR GANTT BARS
    function setupBarInteractionEvents(el, task) {
      // Hover Tooltip Trigger
      el.addEventListener('mouseenter', (e) => {
        if (interaction.active) return;
        showTooltip(e, task);
        
        // Highlight dependency paths for this task
        document.querySelectorAll(`.dependency-line[data-target-id="${task.id}"], .dependency-line[data-source-id="${task.id}"]`)
          .forEach(path => path.classList.add('highlighted'));
      });

      el.addEventListener('mousemove', (e) => {
        if (interaction.active) return;
        positionTooltip(e);
      });

      el.addEventListener('mouseleave', () => {
        hideTooltip();
        document.querySelectorAll('.dependency-line.highlighted').forEach(path => path.classList.remove('highlighted'));
      });

      // Mousedown Drag/Resize Trigger
      el.addEventListener('mousedown', (e) => {
        const handleLeft = e.target.classList.contains('gantt-resize-handle-left');
        const handleRight = e.target.classList.contains('gantt-resize-handle-right');
        
        interaction.active = true;
        interaction.taskId = task.id;
        interaction.element = el;
        interaction.initialClientX = e.clientX;
        interaction.pxPerDay = getPixelsPerDay();

        const startOffset = diffDays(state.projectStart, parseDateStr(task.startDate));
        const endOffset = diffDays(state.projectStart, parseDateStr(task.endDate));

        interaction.initialStartDayOffset = startOffset;
        interaction.initialEndDayOffset = endOffset;

        if (handleLeft) {
          interaction.type = 'resize-left';
          el.classList.add('is-resizing');
        } else if (handleRight) {
          interaction.type = 'resize-right';
          el.classList.add('is-resizing');
        } else {
          interaction.type = 'drag';
          el.classList.add('is-dragging');
        }

        hideTooltip();
        e.preventDefault();
        e.stopPropagation();
      });
    }

    // DRAG AND RESIZE ENGINE MOUSEMOVE / MOUSEUP
    function handleGlobalMouseMove(e) {
      if (!interaction.active) return;

      const deltaX = e.clientX - interaction.initialClientX;
      const deltaDays = Math.round(deltaX / interaction.pxPerDay);

      const task = state.tasks.find(t => t.id === interaction.taskId);
      if (!task) return;

      let newStartOffset = interaction.initialStartDayOffset;
      let newEndOffset = interaction.initialEndDayOffset;

      if (interaction.type === 'drag') {
        newStartOffset += deltaDays;
        newEndOffset += deltaDays;
      } else if (interaction.type === 'resize-left') {
        newStartOffset = Math.min(newStartOffset + deltaDays, newEndOffset - 1);
      } else if (interaction.type === 'resize-right') {
        newEndOffset = Math.max(newEndOffset + deltaDays, newStartOffset + 1);
      }

      // Constrain within project timeline bounds
      newStartOffset = Math.max(0, newStartOffset);
      newEndOffset = Math.min(state.totalTimelineDays, newEndOffset);

      // Perform visual fluid updates (sub-pixel dragging feedback)
      interaction.element.style.left = `${newStartOffset * interaction.pxPerDay}px`;
      interaction.element.style.width = `${(newEndOffset - newStartOffset) * interaction.pxPerDay}px`;

      // Update date objects
      interaction.previewStartDate = addDays(state.projectStart, newStartOffset);
      interaction.previewEndDate = addDays(state.projectStart, newEndOffset);

      // Show real-time drag tooltip
      showDragPreviewTooltip(e, task, interaction.previewStartDate, interaction.previewEndDate);
    }

    function handleGlobalMouseUp(e) {
      if (!interaction.active) return;

      const task = state.tasks.find(t => t.id === interaction.taskId);
      if (task && interaction.previewStartDate && interaction.previewEndDate) {
        // Save the date changes to state
        const oldStart = task.startDate;
        const oldEnd = task.endDate;
        
        task.startDate = formatDateStr(interaction.previewStartDate);
        task.endDate = formatDateStr(interaction.previewEndDate);
        
        if (oldStart !== task.startDate || oldEnd !== task.endDate) {
          showToast(`Rescheduled task "${task.name}"`);
          saveState();
        } else {
          render(); // Snaps back
        }
      } else {
        render(); // Snaps back if no movement
      }

      // Reset
      if (interaction.element) {
        interaction.element.classList.remove('is-dragging', 'is-resizing');
      }
      interaction.active = false;
      interaction.type = null;
      interaction.taskId = null;
      interaction.element = null;
      interaction.previewStartDate = null;
      interaction.previewEndDate = null;
      
      hideTooltip();
    }

    // FLOATING TOOLTIP GENERATION
    const tooltipEl = document.getElementById('gantt-tooltip-el');

    function showTooltip(e, task) {
      const assigneeObj = ASSIGNEES.find(a => a.id === task.assignee);
      
      document.getElementById('tooltip-title').textContent = task.name;
      
      const statusEl = document.getElementById('tooltip-status');
      statusEl.textContent = task.status;
      statusEl.className = `status-chip status-${task.status.toLowerCase().replace(' ', '-')}`;

      const sDate = parseDateStr(task.startDate);
      const eDate = parseDateStr(task.endDate);
      const duration = diffDays(sDate, eDate);

      document.getElementById('tooltip-dates').textContent = `${sDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${eDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
      document.getElementById('tooltip-duration').textContent = `${duration} day${duration > 1 ? 's' : ''}`;
      document.getElementById('tooltip-assignee').textContent = assigneeObj ? assigneeObj.name : 'Unassigned';
      document.getElementById('tooltip-progress').textContent = `${task.progress}%`;

      // Display prerequisites
      const prereqs = task.dependencies.map(id => {
        const t = state.tasks.find(x => x.id === id);
        return t ? t.name : '';
      }).filter(Boolean);
      document.getElementById('tooltip-dependencies').textContent = prereqs.length > 0 ? prereqs.join(', ') : 'None';

      tooltipEl.classList.add('visible');
      positionTooltip(e);
    }

    function showDragPreviewTooltip(e, task, start, end) {
      document.getElementById('tooltip-title').textContent = `Rescheduling: ${task.name}`;
      
      const statusEl = document.getElementById('tooltip-status');
      statusEl.textContent = 'Dragging';
      statusEl.className = `status-chip status-in-progress`;

      const duration = diffDays(start, end);

      document.getElementById('tooltip-dates').textContent = `${start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
      document.getElementById('tooltip-duration').textContent = `${duration} day${duration > 1 ? 's' : ''}`;
      document.getElementById('tooltip-assignee').textContent = 'Updating...';
      document.getElementById('tooltip-progress').textContent = `${task.progress}%`;
      document.getElementById('tooltip-dependencies').textContent = 'Updating...';

      tooltipEl.classList.add('visible');
      positionTooltip(e);
    }

    function positionTooltip(e) {
      const tooltipWidth = tooltipEl.offsetWidth;
      const tooltipHeight = tooltipEl.offsetHeight;
      
      let x = e.clientX + 15;
      let y = e.clientY + 15;
      
      // Keep inside window bounds
      if (x + tooltipWidth > window.innerWidth) {
        x = e.clientX - tooltipWidth - 15;
      }
      if (y + tooltipHeight > window.innerHeight) {
        y = e.clientY - tooltipHeight - 15;
      }

      tooltipEl.style.left = `${x}px`;
      tooltipEl.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltipEl.classList.remove('visible');
    }

    // HELPER: Get zoom pixels per day
    function getPixelsPerDay() {
      if (state.zoomScale === 'days') return 40;
      if (state.zoomScale === 'weeks') return 15;
      if (state.zoomScale === 'months') return 4.5;
      return 40;
    }

    // REGISTER ALL INTERACTIVE COMPONENT LISTENERS
    function registerEventListeners() {
      // Theme preset tabs switcher
      document.querySelectorAll('.preset-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.preset-tab').forEach(t => t.classList.remove('active'));
          const currentTab = e.currentTarget;
          currentTab.classList.add('active');
          const preset = currentTab.dataset.preset;

          // Remove previous theme classes (full presets and group-bar variants)
          document.body.classList.remove(...visualPresetClasses);

          // Aura group-bar variants build on the default Aura look
          if (preset === 'aura-soft' || preset === 'aura-clean' || preset === 'aura-flat') {
            document.body.classList.add(`theme-${preset}`);
          } else if (preset.startsWith('pattern-')) {
            document.body.classList.add(`theme-${preset}`);
          } else if (preset !== 'aura') {
            document.body.classList.add(`theme-preset-${preset}`);
          }
          
          // Redraw dependency lines since fonts or spacing might affect position
          setTimeout(drawDependencyLines, 100);
        });
      });

      // Zoom buttons
      document.querySelectorAll('.segmented-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.segmented-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          state.zoomScale = e.target.dataset.scale;
          calculateProjectBoundaries();
          render();
        });
      });

      // Theme toggle
      document.getElementById('theme-toggle').addEventListener('click', () => {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        localStorage.setItem('gantt_theme', state.theme);
        document.documentElement.setAttribute('data-theme', state.theme);
        updateThemeToggleButtonIcon();
      });

      // Reset button
      document.getElementById('btn-reset').addEventListener('click', () => {
        if (confirm("Are you sure you want to reset all data back to the default demo state?")) {
          localStorage.removeItem('gantt_groups');
          localStorage.removeItem('gantt_tasks');
          showToast("Timeline reset to default template");
          init();
        }
      });

      // Show/Hide critical path toggle
      document.getElementById('critical-path-toggle').addEventListener('change', (e) => {
        state.showCriticalPath = e.target.checked;
        const wrapper = document.getElementById('critical-path-toggle-wrapper');
        if (state.showCriticalPath) {
          wrapper.classList.add('critical-active');
        } else {
          wrapper.classList.remove('critical-active');
        }
        render();
      });

      // Filters
      document.getElementById('search-filter').addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        render();
      });

      document.getElementById('status-filter').addEventListener('change', (e) => {
        state.statusFilter = e.target.value;
        render();
      });

      document.getElementById('assignee-filter').addEventListener('change', (e) => {
        state.assigneeFilter = e.target.value;
        render();
      });

      // Open new buttons
      document.getElementById('btn-add-task').addEventListener('click', openNewTaskModal);
      document.getElementById('btn-add-group').addEventListener('click', openNewGroupModal);

      // Close task modal buttons
      document.getElementById('btn-close-modal').addEventListener('click', () => taskModal.classList.remove('active'));
      document.getElementById('btn-cancel-modal').addEventListener('click', () => taskModal.classList.remove('active'));
      
      // Close group modal buttons
      document.getElementById('btn-close-group-modal').addEventListener('click', () => groupModal.classList.remove('active'));
      document.getElementById('btn-cancel-group-modal').addEventListener('click', () => groupModal.classList.remove('active'));

      // Submit task form
      document.getElementById('task-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const taskId = document.getElementById('form-task-id').value;
        
        const name = document.getElementById('form-task-name').value;
        const start = document.getElementById('form-task-start').value;
        const end = document.getElementById('form-task-end').value;
        const progress = parseInt(document.getElementById('form-task-progress').value, 10);
        const status = document.getElementById('form-task-status').value;
        const assignee = document.getElementById('form-task-assignee').value;
        const groupId = document.getElementById('form-task-group').value;

        // Collect checked dependency checkboxes
        const dependencies = [];
        document.querySelectorAll('#form-dependencies-list input[type="checkbox"]:checked').forEach(cb => {
          dependencies.push(cb.value);
        });

        // Basic date range checks
        if (parseDateStr(start) > parseDateStr(end)) {
          alert("Error: Start date cannot be after end date.");
          return;
        }

        if (taskId) {
          // Edit Mode
          const t = state.tasks.find(x => x.id === taskId);
          if (t) {
            t.name = name;
            t.startDate = start;
            t.endDate = end;
            t.progress = progress;
            t.status = status;
            t.assignee = assignee;
            t.groupId = groupId;
            t.dependencies = dependencies;
            showToast(`Updated task: "${name}"`);
          }
        } else {
          // Create Mode
          const newId = 't_' + Date.now();
          state.tasks.push({
            id: newId,
            groupId,
            name,
            startDate: start,
            endDate: end,
            progress,
            status,
            assignee,
            dependencies
          });
          showToast(`Created task: "${name}"`);
        }

        taskModal.classList.remove('active');
        saveState();
      });

      // Delete Task Button
      document.getElementById('btn-delete-task').addEventListener('click', () => {
        const taskId = document.getElementById('form-task-id').value;
        if (!taskId) return;
        
        if (confirm("Are you sure you want to delete this task?")) {
          // Remove references from dependency lists in other tasks
          state.tasks.forEach(t => {
            t.dependencies = t.dependencies.filter(id => id !== taskId);
          });
          
          state.tasks = state.tasks.filter(t => t.id !== taskId);
          showToast("Task deleted successfully");
          taskModal.classList.remove('active');
          saveState();
        }
      });

      // Submit group form
      document.getElementById('group-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const groupId = document.getElementById('form-group-id').value;
        const name = document.getElementById('form-group-name').value;

        if (groupId) {
          const g = state.groups.find(x => x.id === groupId);
          if (g) {
            g.name = name;
            showToast(`Updated group: "${name}"`);
          }
        } else {
          const newId = 'g_' + Date.now();
          state.groups.push({
            id: newId,
            name,
            collapsed: false
          });
          showToast(`Created group: "${name}"`);
        }

        groupModal.classList.remove('active');
        saveState();
      });

      // Delete Group Button
      document.getElementById('btn-delete-group').addEventListener('click', () => {
        const groupId = document.getElementById('form-group-id').value;
        if (!groupId) return;

        const groupTasks = state.tasks.filter(t => t.groupId === groupId);
        if (groupTasks.length > 0) {
          if (!confirm(`Warning: This group contains ${groupTasks.length} tasks. Deleting the group will delete all tasks under it. Continue?`)) {
            return;
          }
          // Remove references to deleted tasks in dependency lists
          const deletedIds = new Set(groupTasks.map(t => t.id));
          state.tasks.forEach(t => {
            t.dependencies = t.dependencies.filter(id => !deletedIds.has(id));
          });
          state.tasks = state.tasks.filter(t => t.groupId !== groupId);
        }

        state.groups = state.groups.filter(g => g.id !== groupId);
        showToast("Group deleted successfully");
        groupModal.classList.remove('active');
        saveState();
      });

      // Window Scroll / Resize listener for recalculating SVG coords
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(drawDependencyLines, 100);
      });

      // Listen to scroll events in order to redraw paths if anything gets clipped or moves
      const scrollport = document.getElementById('gantt-scrollport');
      scrollport.addEventListener('scroll', () => {
        // Redraw is fast and ensures arrows/bezier curves match scrolling
        drawDependencyLines();
      });

      // Listen to global drag interactions
      window.addEventListener('mousemove', handleGlobalMouseMove);
      window.addEventListener('mouseup', handleGlobalMouseUp);
    }

    // NOTIFICATION TOAST POPUPS
    function showToast(message) {
      const container = document.getElementById('toasts');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span class="icon" style="color: var(--primary);">check_circle</span> ${message}`;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'toast-in 0.3s reverse forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function updateThemeToggleButtonIcon() {
      const toggleBtn = document.getElementById('theme-toggle').querySelector('.icon');
      if (state.theme === 'dark') {
        toggleBtn.textContent = 'light_mode';
      } else {
        toggleBtn.textContent = 'dark_mode';
      }
    }

    // INIT INITIALIZATION
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
