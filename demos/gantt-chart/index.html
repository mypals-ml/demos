<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive, high-fidelity Gantt Chart demo featuring collapsible groups, drag-and-resize timeline bars, SVG dependency lines, critical path calculations, and dynamic filters.">
  <title>Interactive Gantt Chart Studio</title>
  
  <!-- Modern Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Material Icons for sleeker UI buttons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <style>
    /* CSS DESIGN SYSTEM & TOKENS */
    :root {
      /* Theme variables - Light Mode by default */
      --font-primary: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      --bg-color: #f8fafc;
      --surface-color: #ffffff;
      --surface-hover: #f1f5f9;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-inverse: #ffffff;
      
      /* Brand and status colors */
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #dbeafe;
      --accent: #7c3aed;
      
      --status-not-started: #64748b;
      --status-in-progress: #0ea5e9;
      --status-completed: #10b981;
      --status-delayed: #f43f5e;
      
      --status-not-started-bg: #f1f5f9;
      --status-in-progress-bg: #e0f2fe;
      --status-completed-bg: #d1fae5;
      --status-delayed-bg: #ffe4e6;
      
      /* Size-related tokens */
      --sidebar-width: 320px;
      --row-height: 52px;
      --header-height: 64px;
      
      /* Shadows & Effects */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-blur: blur(12px);
      --glass-border: rgba(226, 232, 240, 0.8);
      
      /* Gantt layout settings */
      --day-width: 44px;
      --total-days: 60;
      
      /* Transitions */
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s ease;
    }

    [data-theme="dark"] {
      --bg-color: #0b0f19;
      --surface-color: #111827;
      --surface-hover: #1f2937;
      --border-color: #374151;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --text-inverse: #111827;
      
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-light: #1e3a8a;
      --accent: #8b5cf6;
      
      --status-not-started: #9ca3af;
      --status-in-progress: #38bdf8;
      --status-completed: #34d399;
      --status-delayed: #fb7185;
      
      --status-not-started-bg: #1f2937;
      --status-in-progress-bg: #0c4a6e;
      --status-completed-bg: #064e3b;
      --status-delayed-bg: #4c0519;
      
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(55, 65, 81, 0.8);
    }

    /* GLOBAL STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-primary);
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      transition: background-color var(--transition-normal), color var(--transition-normal);
    }

    button, input, select {
      font-family: inherit;
      color: inherit;
    }

    /* CUSTOM SCROLLBARS */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* UTILITY STYLES */
    .icon {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* APP LAYOUT */
    .app-header {
      height: var(--header-height);
      background-color: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
      transition: background-color var(--transition-normal), border-color var(--transition-normal);
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .brand-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .brand-tag {
      font-size: 0.75rem;
      background: var(--primary-light);
      color: var(--primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .control-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-color);
      background-color: var(--surface-color);
      transition: all var(--transition-fast);
      user-select: none;
    }

    .btn:hover {
      background-color: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverse);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-icon {
      padding: 8px;
      border-radius: 8px;
    }

    /* TOOLBAR CONTROLS */
    .toolbar {
      padding: 12px 24px;
      background-color: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      z-index: 9;
      transition: background-color var(--transition-normal), border-color var(--transition-normal);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input {
      padding: 8px 12px 8px 36px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      font-size: 0.875rem;
      width: 200px;
      transition: all var(--transition-fast);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: var(--surface-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      width: 240px;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .filter-select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--surface-color);
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .filter-select:focus {
      border-color: var(--primary);
    }

    .segmented-control {
      display: inline-flex;
      background-color: var(--bg-color);
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .segmented-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.825rem;
      font-weight: 500;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition-fast);
    }

    .segmented-btn:hover {
      color: var(--text-main);
    }

    .segmented-btn.active {
      background-color: var(--surface-color);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .switch-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }

    .switch-track {
      width: 40px;
      height: 20px;
      border-radius: 20px;
      background-color: var(--border-color);
      position: relative;
      transition: background-color var(--transition-fast);
    }

    .switch-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: white;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .switch-control input {
      display: none;
    }

    .switch-control input:checked + .switch-track {
      background-color: var(--primary);
    }

    .switch-control input:checked + .switch-track .switch-thumb {
      transform: translateX(20px);
    }

    .switch-control.critical-active {
      color: var(--status-delayed);
    }
    .switch-control.critical-active input:checked + .switch-track {
      background-color: var(--status-delayed);
    }

    /* GANTT CONTAINER LAYOUT */
    .gantt-outer-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .gantt-grid-wrapper {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    /* GANTT ROW AND CELL SYSTEM */
    .gantt-grid {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      width: max-content;
      min-width: 100%;
      position: relative;
    }

    /* STICKY HEADER SCROLL ALIGNMENT */
    .gantt-header-row {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1 / -1;
      height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 8;
      background-color: var(--surface-color);
      border-bottom: 2px solid var(--border-color);
      transition: background-color var(--transition-normal), border-color var(--transition-normal);
    }

    .gantt-header-sidebar {
      position: sticky;
      left: 0;
      z-index: 9;
      background-color: var(--surface-color);
      border-right: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--text-muted);
      justify-content: space-between;
    }

    .gantt-header-timeline {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .gantt-timeline-major {
      height: 50%;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      font-size: 0.825rem;
      font-weight: 600;
      padding-left: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background-color: var(--surface-hover);
    }

    .gantt-timeline-minor {
      height: 50%;
      display: flex;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .gantt-time-cell {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-color);
      height: 100%;
    }

    /* BODY ROWS */
    .gantt-row {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1 / -1;
      height: var(--row-height);
      border-bottom: 1px solid var(--border-color);
      transition: background-color var(--transition-fast);
    }

    .gantt-row:hover {
      background-color: var(--surface-hover);
    }

    .gantt-row-sidebar {
      position: sticky;
      left: 0;
      z-index: 5;
      background-color: var(--surface-color);
      border-right: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background-color var(--transition-fast);
    }

    .gantt-row:hover .gantt-row-sidebar {
      background-color: var(--surface-hover);
    }

    .gantt-row-timeline {
      position: relative;
      height: 100%;
      overflow: hidden;
    }

    /* GRID BACKGROUND LINES */
    .gantt-grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background-image: linear-gradient(to right, var(--border-color) 1px, transparent 1px);
      z-index: 1;
    }

    /* SVG CANVAS FOR DEPENDENCIES */
    .gantt-svg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    .dependency-line {
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.45;
      transition: stroke var(--transition-normal), stroke-width var(--transition-normal), opacity var(--transition-normal);
    }

    .dependency-line.critical-path-line {
      stroke: var(--status-delayed);
      stroke-width: 3.5;
      stroke-dasharray: 4, 2;
      opacity: 0.9;
      filter: drop-shadow(0 0 3px rgba(244, 63, 94, 0.4));
    }

    .dependency-line.conflict-line {
      stroke: var(--status-delayed);
      stroke-width: 2.5;
      opacity: 0.8;
    }

    .dependency-line.highlighted {
      stroke: var(--primary);
      stroke-width: 3;
      opacity: 0.95;
    }

    .dependency-arrow {
      fill: var(--text-muted);
      opacity: 0.45;
    }

    .dependency-arrow.critical-path-arrow {
      fill: var(--status-delayed);
      opacity: 0.9;
    }

    .dependency-arrow.conflict-arrow {
      fill: var(--status-delayed);
      opacity: 0.8;
    }

    .dependency-arrow.highlighted {
      fill: var(--primary);
      opacity: 0.95;
    }

    /* GROUP ROWS SPECIAL STYLING */
    .gantt-row-group {
      background-color: var(--bg-color);
      height: 44px;
      font-weight: 600;
    }

    .gantt-row-group .gantt-row-sidebar {
      background-color: var(--bg-color);
      font-family: var(--font-display);
      font-size: 0.9rem;
      gap: 8px;
    }

    .gantt-row-group:hover .gantt-row-sidebar {
      background-color: var(--surface-hover);
    }

    .group-collapse-btn {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      color: var(--text-muted);
      transition: all var(--transition-fast);
    }

    .group-collapse-btn:hover {
      background-color: var(--border-color);
      color: var(--text-main);
    }

    .group-collapse-btn .icon {
      transition: transform var(--transition-fast);
    }

    .gantt-row-group.collapsed .group-collapse-btn .icon {
      transform: rotate(-90deg);
    }

    .group-progress-chip {
      flex-shrink: 0;
      min-width: 48px;
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(37,99,235,0.15);
    }

    /* TASK TITLE LAYOUT IN SIDEBAR */
    .task-sidebar-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding-left: 20px;
    }

    .task-title-text {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-main);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* VISUAL GANTT BARS */
    .gantt-bar-wrapper {
      position: absolute;
      top: 10px;
      height: calc(100% - 20px);
      z-index: 4;
      cursor: grab;
      border-radius: 6px;
      transition: box-shadow var(--transition-fast);
    }

    .gantt-bar-wrapper:active {
      cursor: grabbing;
    }

    .gantt-bar-wrapper.is-dragging {
      opacity: 0.8;
      box-shadow: var(--shadow-lg);
      z-index: 100;
    }

    .gantt-bar-wrapper.is-resizing {
      z-index: 100;
    }

    .gantt-bar {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      background: var(--bar-gradient, linear-gradient(90deg, #94a3b8, #64748b));
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(0, 0, 0, 0.05);
      user-select: none;
    }

    .gantt-bar-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.22);
      pointer-events: none;
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    .gantt-bar-label {
      position: relative;
      z-index: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    /* DRAG RESIZE HANDLES */
    .gantt-resize-handle {
      position: absolute;
      top: 0;
      width: 6px;
      height: 100%;
      cursor: ew-resize;
      z-index: 3;
      background-color: transparent;
      transition: background-color var(--transition-fast);
    }

    .gantt-resize-handle:hover {
      background-color: rgba(255, 255, 255, 0.4);
    }

    .gantt-resize-handle-left {
      left: 0;
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
    }

    .gantt-resize-handle-right {
      right: 0;
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    /* CRITICAL PATH GLOW EFFECT */
    .gantt-bar-wrapper.critical-path-task {
      box-shadow: 0 0 8px rgba(244, 63, 94, 0.35);
      border: 1.5px solid var(--status-delayed);
    }

    /* ROLLUP SUMMARY GANTT BAR */
    .gantt-rollup-bar {
      position: absolute;
      top: 15px;
      height: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0)),
        var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      z-index: 4;
      pointer-events: none;
      box-shadow:
        var(--shadow-sm),
        inset 0 1px 1px rgba(255,255,255,0.6),
        inset 0 -1px 2px rgba(15,23,42,0.05),
        0 8px 18px rgba(15, 23, 42, 0.06);
      overflow: visible;
    }

    /* Diamond milestone end caps */
    .gantt-rollup-bar::before,
    .gantt-rollup-bar::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 11px;
      height: 11px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: 1.5px solid var(--surface-color);
      border-radius: 3px;
      transform: translateY(-50%) rotate(45deg);
      box-shadow: var(--shadow-sm), 0 0 6px rgba(37,99,235,0.35);
      z-index: 5;
    }

    .gantt-rollup-bar::before {
      left: -5px;
    }

    .gantt-rollup-bar::after {
      right: -5px;
    }

    .gantt-rollup-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px;
      opacity: 0.95;
      box-shadow:
        0 0 8px rgba(37, 99, 235, 0.35),
        inset 0 1px 1px rgba(255,255,255,0.45);
    }

    /* Subtle moving sheen across the fill */
    .gantt-rollup-progress::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(
        100deg,
        transparent 30%,
        rgba(255,255,255,0.35) 50%,
        transparent 70%
      );
      background-size: 250% 100%;
      animation: rollup-sheen 3.5s ease-in-out infinite;
    }

    @keyframes rollup-sheen {
      0%   { background-position: 200% 0; }
      60%, 100% { background-position: -120% 0; }
    }

    /* Subtask indicators inside rollup bar */
    .gantt-rollup-subtasks-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    .gantt-rollup-subtask-pill {
      position: absolute;
      height: 5px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 999px;
      opacity: 0.92;
      border: 0.5px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 1px 2px rgba(15,23,42,0.25);
    }

    /* STATUS CHIPS */
    .status-chip {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .status-not-started {
      background-color: var(--status-not-started-bg);
      color: var(--status-not-started);
    }
    .status-in-progress {
      background-color: var(--status-in-progress-bg);
      color: var(--status-in-progress);
    }
    .status-completed {
      background-color: var(--status-completed-bg);
      color: var(--status-completed);
    }
    .status-delayed {
      background-color: var(--status-delayed-bg);
      color: var(--status-delayed);
    }

    /* ASSIGNEE STACKS & AVATARS */
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      border: 2px solid var(--surface-color);
      box-shadow: var(--shadow-sm);
    }

    /* INTERACTIVE TOOLTIP */
    .gantt-tooltip {
      position: absolute;
      z-index: 1000;
      background-color: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow-lg);
      width: 280px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }

    .gantt-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .tooltip-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.3;
    }

    .tooltip-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.8rem;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
    }

    .tooltip-val {
      color: var(--text-main);
      font-weight: 500;
    }

    /* SLATE DRAWER / MODAL */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-normal);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background-color: var(--surface-color);
      border-radius: 16px;
      width: 520px;
      max-width: 90vw;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      transform: scale(0.95);
      transition: transform var(--transition-normal);
      overflow: hidden;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.1rem;
    }

    .modal-close {
      cursor: pointer;
      color: var(--text-muted);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      transition: all var(--transition-fast);
    }

    .modal-close:hover {
      background-color: var(--surface-hover);
      color: var(--text-main);
    }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .form-input {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      font-size: 0.875rem;
      outline: none;
      transition: border-color var(--transition-fast);
      width: 100%;
    }

    .form-input:focus {
      border-color: var(--primary);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      padding: 10px;
      border-radius: 8px;
      background-color: var(--bg-color);
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .modal-footer {
      padding: 18px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--bg-color);
    }

    .modal-footer-right {
      display: flex;
      gap: 12px;
    }

    /* COLLAPSIBLE ROW STATES */
    .gantt-row.is-collapsed-child {
      display: none;
    }

    /* TOAST BANNER NOTIFICATION */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background-color: var(--text-main);
      color: var(--bg-color);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(20px);
      opacity: 0;
      animation: toast-in 0.3s forwards;
    }


    /* DESIGN TABS STYLING */
    .theme-presets-tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      width: 100%;
      align-items: center;
    }
    
    .preset-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--surface-color);
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition-fast);
    }
    
    .preset-tab:hover {
      background-color: var(--surface-hover);
      color: var(--text-main);
    }
    
    .preset-tab.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverse);
      box-shadow: var(--shadow-sm);
    }

    .pattern-divider {
      width: 1px;
      height: 24px;
      background: var(--border-color);
      margin: 0 2px;
    }

        inset 0 0 6px rgba(0, 240, 255, 0.15) !important;
    }
    body.theme-preset-cyber .gantt-rollup-bar::before,
    body.theme-preset-cyber .gantt-rollup-bar::after {

      position: absolute;
      top: 50% !important;
      width: 10px !important;
      height: 10px !important;

      border: 1px solid var(--accent) !important;
      border-radius: 0 !important;
      transform: translateY(-50%) rotate(45deg) !important;
      box-shadow: 0 0 8px var(--accent) !important;
    }
    body.theme-preset-cyber .gantt-rollup-bar::before { left: -5px !important; }
    body.theme-preset-cyber .gantt-rollup-bar::after { right: -5px !important; }
    body.theme-preset-cyber .gantt-rollup-progress {
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px,
        var(--accent) 6px,
        transparent 6px,
        transparent 10px
      ) !important;
      height: 100% !important;
      border-radius: 0px !important;
      box-shadow: 0 0 12px var(--accent) !important;
    }
    body.theme-preset-cyber .gantt-rollup-progress::after { display: none !important; }
    body.theme-preset-cyber .gantt-rollup-subtask-pill {
      height: 6px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      border: 1px solid currentColor !important;
      border-radius: 0 !important;
      background-color: transparent !important;
      box-shadow: 0 0 6px currentColor !important;
    }
    body.theme-preset-cyber .gantt-tooltip {
      border: 1px solid var(--primary) !important;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.15) !important;
    }

    /* MINIMAL EDITORIAL PRESET OVERRIDES */
    body.theme-preset-minimal {
      --bg-color: #faf9f6;
      --surface-color: #ffffff;
      --surface-hover: #f3efe6;
      --border-color: #000000;
      --text-main: #111111;
      --text-muted: #555555;
      --text-inverse: #ffffff;
      
      --primary: #000000;
      --primary-hover: #222222;
      --primary-light: #eae5db;
      --accent: #000000;
      
      --status-not-started: #555555;
      --status-in-progress: #000000;
      --status-completed: #111111;
      --status-delayed: #000000;
      
      --status-not-started-bg: #eae5db;
      --status-in-progress-bg: #ffffff;
      --status-completed-bg: #ffffff;
      --status-delayed-bg: #ffffff;
      
      --font-primary: 'Inter', sans-serif;
      --font-display: 'Playfair Display', serif;
      
      --shadow-sm: none;
      --shadow-md: none;

    body.theme-preset-minimal * {

    body.theme-preset-minimal .gantt-bar-wrapper {

    body.theme-preset-minimal .gantt-bar {

    body.theme-preset-minimal .gantt-bar-progress {

        #000000 4px,

    }

    body.theme-preset-minimal .gantt-rollup-bar {
      background-color: transparent !important;
      border: none !important;
      border-bottom: 2px solid #000000 !important;
      height: 0px !important;
      top: 22px !important;
      box-shadow: none !important;
      overflow: visible !important;
    }
    /* Square serif end brackets */
    body.theme-preset-minimal .gantt-rollup-bar::before,
    body.theme-preset-minimal .gantt-rollup-bar::after {
      content: '' !important;
      position: absolute;
      top: -7px !important;
      width: 2px !important;
      height: 14px !important;
      background-color: #000000 !important;
      border: none !important;
      border-radius: 0 !important;
      transform: none !important;
      box-shadow: none !important;
    }
    body.theme-preset-minimal .gantt-rollup-bar::before { left: 0 !important; }
    body.theme-preset-minimal .gantt-rollup-bar::after { right: 0 !important; }
    body.theme-preset-minimal .gantt-rollup-progress {
      background: #000000 !important;
      height: 5px !important;
      top: -3px !important;
      border: none !important;
      box-shadow: none !important;
    }
    body.theme-preset-minimal .gantt-rollup-progress::after { display: none !important; }
    body.theme-preset-minimal .gantt-rollup-subtask-pill {
      height: 10px !important;
      width: 2px !important;
      top: -5px !important;
      transform: none !important;
      background-color: #000000 !important;
      border: none !important;
      opacity: 1 !important;
      box-shadow: none !important;
    }
    
    body.theme-preset-minimal .avatar {
      border: 1px solid #000000 !important;
      background-color: #ffffff !important;
      color: #000000 !important;
    }

    body.theme-preset-minimal .status-chip {
      border: 1px solid #000000 !important;
      background: #ffffff !important;
      color: #000000 !important;
      font-weight: bold !important;
    }

    /* SUNSET OASIS PRESET OVERRIDES */
    body.theme-preset-oasis {
      --bg-color: #fdf8f5;
      --surface-color: #fffbf9;
      --surface-hover: #f9ede6;
      --border-color: #ebd9ce;
      --text-main: #5c3d2e;
      --text-muted: #a08476;
      --text-inverse: #fffbf9;
      
      --primary: #c87a53;
      --primary-hover: #b26842;
      --primary-light: #f7e6dc;
      --accent: #99a98c;
      
      --status-not-started: #a08476;
      --status-in-progress: #c87a53;
      --status-completed: #8ea17e;
      --status-delayed: #d96a58;
      
      --status-not-started-bg: #ebd9ce;
      --status-in-progress-bg: #f9ede6;
      --status-completed-bg: #eaf1e5;
      --status-delayed-bg: #fbeae6;
      
      --font-primary: 'Outfit', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      --shadow-sm: 0 2px 4px rgba(92, 61, 46, 0.02);
      --shadow-md: 0 4px 10px rgba(92, 61, 46, 0.04);
      --shadow-lg: 0 10px 20px rgba(92, 61, 46, 0.06);
    }

    body.theme-preset-oasis * {
      border-radius: 9999px !important;
    }

    body.theme-preset-oasis .gantt-grid, 
    body.theme-preset-oasis .gantt-header-row,
    body.theme-preset-oasis .gantt-row,
    body.theme-preset-oasis .gantt-row-sidebar,
    body.theme-preset-oasis .gantt-row-timeline,
    body.theme-preset-oasis .gantt-grid-bg,
    body.theme-preset-oasis .gantt-header-timeline,
    body.theme-preset-oasis .gantt-timeline-major,
    body.theme-preset-oasis .gantt-timeline-minor,
    body.theme-preset-oasis .gantt-time-cell,
    body.theme-preset-oasis .modal,
    body.theme-preset-oasis .modal-body,
    body.theme-preset-oasis .checkbox-group,
    body.theme-preset-oasis .gantt-tooltip {
      border-radius: 0px !important;
    }

    body.theme-preset-oasis .modal,
    body.theme-preset-oasis .gantt-tooltip {
      border-radius: 20px !important;
    }
    
    body.theme-preset-oasis .form-input,
    body.theme-preset-oasis .segmented-control,
    body.theme-preset-oasis .segmented-btn,
    body.theme-preset-oasis .btn,
    body.theme-preset-oasis .search-input {
      border-radius: 12px !important;
    }

    body.theme-preset-oasis .gantt-bar-wrapper {
      border-radius: 9999px !important;
      overflow: hidden;
    }

    body.theme-preset-oasis .gantt-bar {
      border-radius: 9999px !important;
      border: none !important;
    }

    body.theme-preset-oasis .gantt-bar-progress {
      border-radius: 9999px !important;
      background-color: rgba(255, 255, 255, 0.25) !important;
      border-right: none !important;
    }

    body.theme-preset-oasis .gantt-rollup-bar {
      background-color: var(--primary-light) !important;
      border: none !important;
      height: 12px !important;
      top: 16px !important;
      border-radius: 9999px !important;
      box-shadow:
        var(--shadow-sm),
        inset 0 1px 2px rgba(92,61,46,0.06) !important;
      overflow: visible !important;
    }
    body.theme-preset-oasis .gantt-rollup-bar::before,
    body.theme-preset-oasis .gantt-rollup-bar::after {
      content: '' !important;
      position: absolute;
      top: 50% !important;
      width: 14px !important;
      height: 14px !important;
      border-radius: 50% !important;
      background: radial-gradient(circle at 35% 30%, #ffffff 0%, var(--primary) 70%) !important;
      border: 2px solid var(--surface-color) !important;
      transform: translateY(-50%) !important;
      box-shadow: var(--shadow-md) !important;
    }
    body.theme-preset-oasis .gantt-rollup-bar::before { left: -6px !important; }
    body.theme-preset-oasis .gantt-rollup-bar::after { right: -6px !important; }
    body.theme-preset-oasis .gantt-rollup-progress {
      background: linear-gradient(90deg, var(--primary), var(--accent)) !important;
      height: 100% !important;
      top: 0 !important;
      border-radius: 9999px !important;
      opacity: 0.9 !important;
      box-shadow: 0 0 6px rgba(200,122,83,0.3) !important;
    }
    body.theme-preset-oasis .gantt-rollup-progress::after { display: none !important; }
    body.theme-preset-oasis .gantt-rollup-subtask-pill {
      height: 6px !important;
      border-radius: 9999px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      border: 0.5px solid rgba(255,255,255,0.6) !important;
      opacity: 0.95 !important;
      box-shadow: 0 1px 2px rgba(92,61,46,0.2) !important;
    }
  </style>
</head>
<body>

  <!-- APP HEADER -->
  <header class="app-header">
    <div class="brand-section">
      <div class="brand-logo">
        <span class="icon">timeline</span>
      </div>
      <div>
        <h1 class="brand-title">Interactive Gantt Chart Studio</h1>
      </div>
      <span class="brand-tag">v1.1</span>
    </div>
    
    <div class="control-actions">
      <!-- Dark/Light Toggle -->
      <button class="btn btn-icon" id="theme-toggle" title="Toggle theme">
        <span class="icon">dark_mode</span>
      </button>
      
      <!-- Reset Demo Data -->
      <button class="btn" id="btn-reset" title="Reset Demo Data">
        <span class="icon">restart_alt</span>
        Reset Data
      </button>

      <button class="btn btn-primary" id="btn-add-task">
        <span class="icon">add</span>
        New Task
      </button>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <!-- Design Switcher Tabs -->
    <div class="theme-presets-tab-bar">
      <span style="font-size: 0.725rem; font-weight: 800; color: var(--text-muted); align-self: center; margin-right: 8px; text-transform: uppercase; letter-spacing: 0.05em; display: inline-flex; align-items: center; gap: 4px;">
        <span class="icon" style="font-size: 16px;">palette</span> Design Presets:
      </span>
      <button class="preset-tab active" data-preset="aura">
        <span class="icon" style="font-size: 16px;">blur_on</span> Aura Glass
      </button>
      <button class="preset-tab" data-preset="aura-soft">
        <span class="icon" style="font-size: 16px;">water_drop</span> Aura Soft
      </button>
      <button class="preset-tab" data-preset="aura-clean">
        <span class="icon" style="font-size: 16px;">deblur</span> Aura Clean
      </button>
      <button class="preset-tab" data-preset="aura-flat">
        <span class="icon" style="font-size: 16px;">horizontal_rule</span> Aura Flat
      </button>
      <button class="preset-tab" data-preset="cyber">
        <span class="icon" style="font-size: 16px;">terminal</span> Carbon Cyber
      </button>
      <button class="preset-tab" data-preset="minimal">
        <span class="icon" style="font-size: 16px;">edit_document</span> Minimal Editorial
      </button>
      <button class="preset-tab" data-preset="oasis">
        <span class="icon" style="font-size: 16px;">spa</span> Sunset Oasis
      </button>
      <span class="pattern-divider" aria-hidden="true"></span>
      <button class="preset-tab" data-preset="pattern-ribbon">
        <span class="icon" style="font-size: 16px;">featured_seasonal_and_gifts</span> Ribbon Rollup
      </button>
      <button class="preset-tab" data-preset="pattern-baseline">
        <span class="icon" style="font-size: 16px;">stacked_line_chart</span> Baseline Actual
      </button>
      <button class="preset-tab" data-preset="pattern-segmented">
        <span class="icon" style="font-size: 16px;">view_timeline</span> Status Segments
      </button>
      <button class="preset-tab" data-preset="pattern-heatmap">
        <span class="icon" style="font-size: 16px;">blur_linear</span> Heatmap Bands
      </button>
      <button class="preset-tab" data-preset="pattern-milestone">
        <span class="icon" style="font-size: 16px;">conversion_path</span> Milestone Thread
      </button>
      <button class="preset-tab" data-preset="pattern-thread-dots">
        <span class="icon" style="font-size: 16px;">radio_button_checked</span> Thread Dots
      </button>
      <button class="preset-tab" data-preset="pattern-thread-capsules">
        <span class="icon" style="font-size: 16px;">pill</span> Thread Capsules
      </button>
      <button class="preset-tab" data-preset="pattern-thread-flags">
        <span class="icon" style="font-size: 16px;">flag</span> Thread Flags
      </button>
      <button class="preset-tab" data-preset="pattern-thread-hex">
        <span class="icon" style="font-size: 16px;">hexagon</span> Thread Hex
      </button>
      <button class="preset-tab" data-preset="pattern-thread-squares">
        <span class="icon" style="font-size: 16px;">stop</span> Thread Squares
      </button>
      <button class="preset-tab" data-preset="pattern-thread-triangles">
        <span class="icon" style="font-size: 16px;">change_history</span> Thread Triangles
      </button>
      <button class="preset-tab" data-preset="pattern-exec-span">
        <span class="icon" style="font-size: 16px;">view_timeline</span> Executive Span
      </button>
      <button class="preset-tab" data-preset="pattern-bracket-band">
        <span class="icon" style="font-size: 16px;">data_array</span> Bracket Band
      </button>
      <button class="preset-tab" data-preset="pattern-risk-rail">
        <span class="icon" style="font-size: 16px;">emergency_home</span> Risk Rail
      </button>
      <button class="preset-tab" data-preset="pattern-folder-tab">
        <span class="icon" style="font-size: 16px;">folder_open</span> Folder Tab
      </button>
      <button class="preset-tab" data-preset="pattern-brace">
        <span class="icon" style="font-size: 16px;">counter_1</span> Brace
      </button>
      <button class="preset-tab" data-preset="pattern-nested-band">
        <span class="icon" style="font-size: 16px;">select</span> Nested Band
      </button>
      <button class="preset-tab" data-preset="pattern-stacked-strip">
        <span class="icon" style="font-size: 16px;">density_medium</span> Stacked Strip
      </button>
      <button class="preset-tab" data-preset="pattern-folder-chip">
        <span class="icon" style="font-size: 16px;">folder_special</span> Folder Chip
      </button>
      <button class="preset-tab" data-preset="pattern-swimlane-band">
        <span class="icon" style="font-size: 16px;">table_rows</span> Swimlane Band
      </button>
    </div>

    <div class="toolbar-left">
      <!-- Search -->
      <div class="search-wrapper">
        <span class="icon search-icon">search</span>
        <input type="text" class="search-input" id="search-filter" placeholder="Search tasks...">
      </div>

      <!-- Filters -->
      <select class="filter-select" id="status-filter">
        <option value="all">All Statuses</option>
        <option value="Not Started">Not Started</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
        <option value="Delayed">Delayed</option>
      </select>

      <select class="filter-select" id="assignee-filter">
        <option value="all">All Assignees</option>
      </select>

      <!-- Zoom / Time-Scale Segmented Control -->
      <div class="segmented-control">
        <button class="segmented-btn active" data-scale="days">Days</button>
        <button class="segmented-btn" data-scale="weeks">Weeks</button>
        <button class="segmented-btn" data-scale="months">Months</button>
      </div>
    </div>

    <div class="toolbar-right">
      <!-- Critical Path Switcher -->
      <label class="switch-control" id="critical-path-toggle-wrapper">
        <input type="checkbox" id="critical-path-toggle">
        <span class="switch-track">
          <span class="switch-thumb"></span>
        </span>
        Show Critical Path
      </label>
    </div>
  </div>

  <!-- GANTT WORKSPACE -->
  <div class="gantt-outer-container">
    <div class="gantt-grid-wrapper" id="gantt-scrollport">
      <div class="gantt-grid" id="gantt-grid-canvas">
        
        <!-- HEADER ROW (Dynamic content inside timeline) -->
        <div class="gantt-header-row" id="gantt-header-container">
          <div class="gantt-header-sidebar">
            <span>Project Tasks</span>
            <button class="btn btn-icon" id="btn-add-group" title="Add New Group" style="padding: 4px; border-radius: 4px;">
              <span class="icon" style="font-size: 16px;">create_new_folder</span>
            </button>
          </div>
          <div class="gantt-header-timeline" id="timeline-headers">
            <!-- Dynamic minor/major columns here -->
          </div>
        </div>

        <!-- DYNAMIC BODY ROWS -->
        <div class="gantt-svg-canvas-container" style="position: absolute; top: var(--header-height); left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: calc(100% - var(--header-height)); pointer-events: none; z-index: 3;">
          <svg class="gantt-svg-canvas" id="gantt-svg"></svg>
        </div>
        
        <div id="gantt-rows-container" style="display: contents;">
          <!-- Rows will render dynamically here -->
        </div>

      </div>
    </div>
  </div>

  <!-- TOOLTIP OVERLAY -->
  <div class="gantt-tooltip" id="gantt-tooltip-el">
    <div class="tooltip-header">
      <h4 class="tooltip-title" id="tooltip-title">Task Title</h4>
      <span class="status-chip" id="tooltip-status">In Progress</span>
    </div>
    <div class="tooltip-body">
      <div class="tooltip-row">
        <span>Dates:</span>
        <span class="tooltip-val" id="tooltip-dates">Jun 01 - Jun 10</span>
      </div>
      <div class="tooltip-row">
        <span>Duration:</span>
        <span class="tooltip-val" id="tooltip-duration">9 days</span>
      </div>
      <div class="tooltip-row">
        <span>Assignee:</span>
        <span class="tooltip-val" id="tooltip-assignee">Alex Chen</span>
      </div>
      <div class="tooltip-row">
        <span>Progress:</span>
        <span class="tooltip-val" id="tooltip-progress">50%</span>
      </div>
      <div class="tooltip-row">
        <span>Dependencies:</span>
        <span class="tooltip-val" id="tooltip-dependencies">None</span>
      </div>
    </div>
  </div>

  <!-- TASK MODAL EDITOR -->
  <div class="modal-overlay" id="task-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-heading">Edit Task</h3>
        <button class="modal-close" id="btn-close-modal"><span class="icon">close</span></button>
      </div>
      <form id="task-form">
        <div class="modal-body">
          <input type="hidden" id="form-task-id">
          
          <div class="form-group">
            <label class="form-label" for="form-task-name">Task Name</label>
            <input type="text" class="form-input" id="form-task-name" required placeholder="Enter task name">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="form-task-start">Start Date</label>
              <input type="date" class="form-input" id="form-task-start" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-task-end">End Date</label>
              <input type="date" class="form-input" id="form-task-end" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="form-task-progress">Progress (%)</label>
              <input type="number" class="form-input" id="form-task-progress" min="0" max="100" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-task-status">Status</label>
              <select class="form-input" id="form-task-status">
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Delayed">Delayed</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="form-task-group">Group</label>
              <select class="form-input" id="form-task-group" required>
                <!-- Dynamic group list -->
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="form-task-assignee">Assignee</label>
              <select class="form-input" id="form-task-assignee" required>
                <!-- Dynamic assignees -->
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Pre-requisites (Dependencies)</label>
            <div class="checkbox-group" id="form-dependencies-list">
              <!-- Checkboxes will load dynamically here -->
            </div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn" id="btn-delete-task" style="color: var(--status-delayed); border-color: var(--status-delayed-bg);">
            <span class="icon">delete</span>
            Delete Task
          </button>
          <div class="modal-footer-right">
            <button type="button" class="btn" id="btn-cancel-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btn-submit-task">Save Changes</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- GROUP MODAL EDITOR -->
  <div class="modal-overlay" id="group-modal-overlay">
    <div class="modal" style="width: 400px;">
      <div class="modal-header">
        <h3 class="modal-title" id="group-modal-heading">New Group</h3>
        <button class="modal-close" id="btn-close-group-modal"><span class="icon">close</span></button>
      </div>
      <form id="group-form">
        <div class="modal-body">
          <input type="hidden" id="form-group-id">
          <div class="form-group">
            <label class="form-label" for="form-group-name">Group Name</label>
            <input type="text" class="form-input" id="form-group-name" required placeholder="e.g. Design Phase">
          </div>

    // APPLICATION STATE
    let state = {
      groups: [],

    // ACTIVE DRAG/RESIZE VARIABLES
    let interaction = {
      active: false,

    // DATE MATHEMATICS HELPER FUNCTIONS
    function parseDateStr(str) {
      const parts = str.split('-');
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function formatDateStr(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
      const d = new Date(date.getTime());
      d.setDate(d.getDate() + days);
      return d;
    }

    function diffDays(date1, date2) {
      const d1 = new Date(date1.getFullYear(), date1.getMonth(), date1.getDate());
      const d2 = new Date(date2.getFullYear(), date2.getMonth(), date2.getDate());
      return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    }

    function getFormattedMonthYear(date) {
      return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // STATE CONTROLLER
    function init() {
      // Load from localStorage or use initial presets
      const savedGroups = localStorage.getItem('gantt_groups');
      const savedTasks = localStorage.getItem('gantt_tasks');
      const savedTheme = localStorage.getItem('gantt_theme');
      
      state.groups = savedGroups ? JSON.parse(savedGroups) : JSON.parse(JSON.stringify(INITIAL_GROUPS));
      state.tasks = savedTasks ? JSON.parse(savedTasks) : JSON.parse(JSON.stringify(INITIAL_TASKS));
      state.theme = savedTheme || 'light';
      
      document.documentElement.setAttribute('data-theme', state.theme);
      updateThemeToggleButtonIcon();

      // Populate filter dropdown
      const assigneeFilterSelect = document.getElementById('assignee-filter');
      const modalAssigneeSelect = document.getElementById('form-task-assignee');
      
      ASSIGNEES.forEach(a => {

        option2.value = a.id;
        option2.textContent = a.name;
        modalAssigneeSelect.appendChild(option2);
      });

      calculateProjectBoundaries();
      render();
      registerEventListeners();
      
      // Auto-scroll slightly to center project start
      setTimeout(() => {
        const scrollport = document.getElementById('gantt-scrollport');

        }
